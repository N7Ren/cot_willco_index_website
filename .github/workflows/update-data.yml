name: Update COT Data

on:
  schedule:
    # COT data is released on Fridays at 3:30 PM ET.
    # 21:00 UTC (9:00 PM) is usually safe for the weekly update.
    - cron: "0 21 * * 5"
  workflow_dispatch: # Allows manual trigger from the Actions tab

concurrency:
  group: "workflow-data-update"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit and push changes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r _scripts/requirements.txt

      - name: Run build script
        run: python _scripts/build.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/data.json _data/cot.csv
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update COT data: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            
            # Retry pushing a few times in case of concurrent updates
            for i in {1..5}; do
              if git pull --rebase origin main && git push; then
                exit 0
              fi
              echo "Push failed, retrying in 10 seconds..."
              sleep 10
            done
            exit 1
          fi

      - name: Trigger Jekyll Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml
